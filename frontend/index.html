<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealPresent — Présentations immobilières en 2 minutes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #c8a45c;
            --dark: #1a1a2e;
            --bg: #fafaf8;
            --border: #e8e8e4;
            --text: #2d2d3a;
            --text-light: #6b6b80;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .units-container {
            margin-top: 1rem;
        }

        .unit-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            align-items: end;
        }

        .unit-row input {
            margin-bottom: 0;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .btn-primary:hover {
            background: #a8873d;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-remove {
            background: #fee;
            color: #c00;
            padding: 0.5rem;
        }

        .result {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .result.show {
            display: block;
        }

        .result-url {
            background: var(--dark);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            word-break: break-all;
        }

        .result-url a {
            color: var(--primary);
            text-decoration: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .config-section {
            background: #fff9ed;
            border: 2px solid var(--primary);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .config-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-ok { background: #4ade80; }
        .status-error { background: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 DealPresent</h1>
            <p class="subtitle">Créez des présentations immobilières professionnelles en 2 minutes</p>
        </header>

        <!-- Config Section -->
        <div class="config-section" id="configSection">
            <div class="config-status">
                <span class="status-dot status-error" id="statusDot"></span>
                <strong id="statusText">Configuration requise</strong>
            </div>
            <div class="form-group">
                <label>Clé API</label>
                <input type="password" id="apiKey" placeholder="sk-ant-... (Claude) / sk-... (OpenAI/OpenRouter)">
            </div>
            <div class="form-group">
                <label>Provider</label>
                <select id="provider" class="btn" style="width: 100%;">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="openrouter">OpenRouter (tous modèles)</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="saveConfig()">💾 Enregistrer la configuration</button>
        </div>

        <!-- Main Form -->
        <div class="card">
            <form id="dealForm" onsubmit="generatePresentation(event)">
                <div class="form-group">
                    <label>📍 Adresse du bien</label>
                    <input type="text" name="address" placeholder="91 Rue Jean Moulin, 62220 Carvin" required>
                </div>

                <div class="form-group">
                    <label>💰 Prix d'achat (€)</label>
                    <input type="number" name="purchasePrice" placeholder="180000" required>
                </div>

                <div class="form-group">
                    <label>🔧 Montant travaux (€) <span style="font-weight: 400; color: var(--text-light);">— Optionnel</span></label>
                    <input type="number" name="renovationCost" placeholder="130000">
                </div>

                <div class="form-group">
                    <label>📸 Photo du bien <span style="font-weight: 400; color: var(--text-light);">— Optionnel</span></label>
                    <input type="file" name="photo" accept="image/*">
                </div>

                <div class="form-group">
                    <label>🏠 Lots / Unités locatives</label>
                    <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 1rem;">
                        Ajoutez chaque unité (local, entrepôt, appartement, etc.)
                    </p>
                    <div class="units-container" id="unitsContainer">
                        <div class="unit-row">
                            <input type="text" placeholder="Type (ex: Local commercial)" class="unit-type" required>
                            <input type="number" placeholder="Surface (m²)" class="unit-surface" required>
                            <input type="number" placeholder="Loyer (€/mois)" class="unit-rent" required>
                            <button type="button" class="btn btn-remove" onclick="removeUnit(this)">❌</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary" onclick="addUnit()">➕ Ajouter une unité</button>
                </div>

                <button type="submit" class="btn btn-primary">🚀 Générer la présentation</button>
            </form>
        </div>

        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Génération de votre présentation en cours...</p>
            <p style="color: var(--text-light); margin-top: 0.5rem;">Cela peut prendre 10-20 secondes</p>
        </div>

        <!-- Result -->
        <div class="result" id="result">
            <h2 style="margin-bottom: 1rem;">✅ Présentation créée !</h2>
            <div class="result-url">
                <strong>URL de votre présentation :</strong><br>
                <a href="#" id="resultLink" target="_blank"></a>
            </div>
            <button class="btn btn-primary" onclick="location.reload()">Créer une nouvelle présentation</button>
        </div>
    </div>

    <script>
        // Check config on load
        window.onload = async () => {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                
                if (data.configured) {
                    document.getElementById('statusDot').className = 'status-dot status-ok';
                    document.getElementById('statusText').textContent = `Configuré (${data.provider})`;
                }
            } catch (e) {
                console.error('Config check failed:', e);
            }
        };

        async function saveConfig() {
            const apiKey = document.getElementById('apiKey').value;
            const provider = document.getElementById('provider').value;

            if (!apiKey) {
                alert('Veuillez entrer une clé API');
                return;
            }

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, provider })
                });

                if (res.ok) {
                    document.getElementById('statusDot').className = 'status-dot status-ok';
                    document.getElementById('statusText').textContent = `Configuré (${provider})`;
                    alert('✅ Configuration enregistrée !');
                } else {
                    alert('❌ Erreur lors de l\'enregistrement');
                }
            } catch (e) {
                alert('❌ Erreur de connexion');
            }
        }

        function addUnit() {
            const container = document.getElementById('unitsContainer');
            const row = document.createElement('div');
            row.className = 'unit-row';
            row.innerHTML = `
                <input type="text" placeholder="Type (ex: Entrepôt)" class="unit-type" required>
                <input type="number" placeholder="Surface (m²)" class="unit-surface" required>
                <input type="number" placeholder="Loyer (€/mois)" class="unit-rent" required>
                <button type="button" class="btn btn-remove" onclick="removeUnit(this)">❌</button>
            `;
            container.appendChild(row);
        }

        function removeUnit(btn) {
            const container = document.getElementById('unitsContainer');
            if (container.children.length > 1) {
                btn.parentElement.remove();
            } else {
                alert('Il faut au moins une unité');
            }
        }

        async function generatePresentation(e) {
            e.preventDefault();

            const form = document.getElementById('dealForm');
            const formData = new FormData(form);

            // Collect units
            const units = [];
            document.querySelectorAll('.unit-row').forEach(row => {
                units.push({
                    type: row.querySelector('.unit-type').value,
                    surface: row.querySelector('.unit-surface').value,
                    rent: row.querySelector('.unit-rent').value
                });
            });

            formData.append('units', JSON.stringify(units));

            // Show loading
            document.querySelector('.card').style.display = 'none';
            document.getElementById('loading').classList.add('show');

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (data.success) {
                    const fullUrl = window.location.origin + data.url;
                    document.getElementById('resultLink').href = fullUrl;
                    document.getElementById('resultLink').textContent = fullUrl;
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('result').classList.add('show');
                } else {
                    throw new Error(data.error || 'Erreur inconnue');
                }
            } catch (error) {
                alert('❌ Erreur : ' + error.message);
                document.querySelector('.card').style.display = 'block';
                document.getElementById('loading').classList.remove('show');
            }
        }
    </script>
</body>
</html>
